server:
  port: 8080
secure_store: ephemeral
secure_store_props: src/main/resources/ephemeral.properties

spring:
  application:
    name: edge-erm
  main:
    allow-bean-definition-overriding: true
  liquibase:
    enabled: false
  jackson:
    deserialization:
      fail-on-unknown-properties: false
      accept-single-value-as-array: true

folio:
  exchange:
    enabled: false # edge-common-spring provides its own HttpServiceProxyFactory (edgeHttpServiceProxyFactory)
  logging:
    exchange:
      enabled: true
      level: BASIC
  tenant:
    validation:
      enabled: false
  system-user:
    username: dummy # This isn't actually used, but we get dependency injection errors from folio-spring-system-user if we don't have it
    password: dummy # This isn't actually used, but we get dependency injection errors from folio-spring-system-user if we don't have it
  environment: dev # Overridden at runtime in production, but causes folio-spring-system-user DI errors if it's not set
  client:
    okapiUrl: http://localhost:9130
    tls:
      enabled: false
      #      trustStorePath: classpath:test/test.truststore.bcfks
      #      trustStorePassword: "SecretPassword"
      #      trustStoreType: bcfks

management:
  endpoints:
    web:
      exposure:
        include: info,health,env,httpexchanges
      base-path: /admin
  #  endpoint:
  #    health:
  #      show-details: always
  #      show-components: always
  ###################################################
  # Disable all checks except for readiness
  ###################################################
  health:
    defaults:
      enabled: false
    readinessstate:
      enabled: true
debug: false

logging:
  config: classpath:log4j2.xml

token:
  capacity: ${token_cache_capacity:100}
  ttl-ms: ${token_cache_ttl_ms:3600000}
  fail-ttl-ms: ${null_token_cache_ttl_ms:30000}

thread-pool-executor:
  config:
    core-pool-size: ${core_pool_size:30}
    max-pool-size: ${max_pool_size:1000}
    queue-capacity: ${queue_capacity:100}
    keep-alive-seconds: ${keep_alive_seconds:10}
